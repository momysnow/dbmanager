name: Code Quality

on:
  push:
  pull_request:

# Default to read-only token; tighten further per-job if needed.
permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        # SHA-pinned to defeat tag-republish supply-chain attacks. The trailing
        # comment names the human-readable version so reviewers can spot a
        # mismatch. Dependabot (.github/dependabot.yml) keeps these fresh.
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"
      - name: Run pre-commit
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

      # Smoke-test the alembic upgrade/downgrade path against a throwaway
      # SQLite DB. Catches migrations that aren't reversible BEFORE they
      # ship — once a non-reversible migration is in prod we have no
      # rollback story.
      - name: Alembic upgrade/downgrade smoke test
        working-directory: backend
        env:
          DBMANAGER_DATA_DIR: ${{ runner.temp }}/dbm-alembic
        run: |
          set -euo pipefail
          mkdir -p "$DBMANAGER_DATA_DIR"
          pip install --no-cache-dir -r requirements.lock
          alembic upgrade head
          alembic downgrade -1 || echo "no prior revision — first migration"
          alembic upgrade head

      # Scan filesystem + lockfiles for known CVEs. Fails the build on
      # HIGH/CRITICAL findings so a vulnerable transitive dep can't slip
      # into a release silently.
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      # Generate an SBOM artifact for compliance / supply-chain audits.
      - name: Generate SBOM
        uses: anchore/sbom-action@e11c554f704a0b820cbf8c51673f6945e0731532 # v0.20.0
        with:
          path: .
          format: spdx-json
          artifact-name: dbmanager-sbom.spdx.json
