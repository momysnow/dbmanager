# Pre-commit configuration for the repo root.
# Black is enforced as a blocking check on backend Python sources.
# flake8 runs as a non-blocking style report (--exit-zero) so the
# pipeline highlights regressions without gating commits on legacy
# style violations. Re-tighten this once the backend is fully clean.
repos:
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        types: [python]
        files: ^backend/
        args: ["--config", "backend/pyproject.toml"]

  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: flake8 (warn)
        types: [python]
        files: ^backend/
        args: ["--config", "backend/setup.cfg", "--exit-zero"]

  # Block accidental commits of secrets / credentials.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # Ban stray `print(` calls in backend code — they bypass the JSON logger
  # used by the log-shipping pipeline, so any call here that ends up in prod
  # is invisible to centralised logging. CLI entry points are exempted.
  - repo: local
    hooks:
      - id: no-print-in-backend
        name: no print() in backend (use logger)
        entry: bash -c 'grep -rn "^[[:space:]]*print(" backend/api backend/core backend/db backend/middleware backend/proxy 2>/dev/null && exit 1 || exit 0'
        language: system
        pass_filenames: false
