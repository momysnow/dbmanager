services:
  backend:
    build: ./backend
    container_name: dbmanager-backend
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - ./caddy:/etc/dbmanager/caddy
      - /var/run/docker.sock:/var/run/docker.sock # Docker API access
    expose:
      - "8000"
    environment:
      - DBMANAGER_DATA_DIR=/app/data
      - DBMANAGER_CREATE_ADMIN=${DBMANAGER_CREATE_ADMIN:-true}
      - DBMANAGER_ADMIN_USER=${DBMANAGER_ADMIN_USER:-admin}
      - DBMANAGER_ADMIN_PASSWORD=${DBMANAGER_ADMIN_PASSWORD:-admin}
      - DBMANAGER_JWT_SECRET=${DBMANAGER_JWT_SECRET:-}
      - DBMANAGER_MASTER_KEY=${DBMANAGER_MASTER_KEY:-}
      - DBMANAGER_ENABLE_CLI=${DBMANAGER_ENABLE_CLI:-false}
      # CORS: comma-separated list of allowed origins (leave empty for localhost defaults)
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      # Reverse proxy (Caddy) — see .env.example for full list
      - DBMANAGER_PROXY_ENABLED=${DBMANAGER_PROXY_ENABLED:-true}
      - DBMANAGER_PROXY_MODE=${DBMANAGER_PROXY_MODE:-}
      - DBMANAGER_PROXY_DOMAIN=${DBMANAGER_PROXY_DOMAIN:-}
      - DBMANAGER_PROXY_ACME_METHOD=${DBMANAGER_PROXY_ACME_METHOD:-}
      - DBMANAGER_PROXY_ACME_EMAIL=${DBMANAGER_PROXY_ACME_EMAIL:-}
      - DBMANAGER_PROXY_DNS_PROVIDER=${DBMANAGER_PROXY_DNS_PROVIDER:-}
      - DBMANAGER_PROXY_CERT_PATH=${DBMANAGER_PROXY_CERT_PATH:-}
      - DBMANAGER_PROXY_KEY_PATH=${DBMANAGER_PROXY_KEY_PATH:-}
      - DBMANAGER_PROXY_NONINTERACTIVE=${DBMANAGER_PROXY_NONINTERACTIVE:-true}
      - DBMANAGER_PROXY_ADMIN_URL=http://caddy:2019
      - DBMANAGER_PROXY_CADDY_CONTAINER=dbmanager-caddy
      # DNS provider credentials (only the one you use is needed)
      - CF_API_TOKEN=${CF_API_TOKEN:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-}
      - DO_AUTH_TOKEN=${DO_AUTH_TOKEN:-}
      - GANDI_API_TOKEN=${GANDI_API_TOKEN:-}
      - DUCKDNS_API_TOKEN=${DUCKDNS_API_TOKEN:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: dbmanager-frontend
    expose:
      - "5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://backend:8000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  caddy:
    build: ./caddy
    container_name: dbmanager-caddy
    ports:
      - "${DBMANAGER_PROXY_HTTP_PORT:-80}:80"
      - "${DBMANAGER_PROXY_HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DBMANAGER_PROXY_ACME_EMAIL=${DBMANAGER_PROXY_ACME_EMAIL:-}
      - DBMANAGER_PROXY_DOMAIN=${DBMANAGER_PROXY_DOMAIN:-}
      - CF_API_TOKEN=${CF_API_TOKEN:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-}
      - DO_AUTH_TOKEN=${DO_AUTH_TOKEN:-}
      - GANDI_API_TOKEN=${GANDI_API_TOKEN:-}
      - DUCKDNS_API_TOKEN=${DUCKDNS_API_TOKEN:-}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
