# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.test.yml  —  TEST / DEVELOPMENT INFRASTRUCTURE ONLY
#
# ⚠ DO NOT USE IN PRODUCTION ⚠
# Ports are bound to 127.0.0.1 (loopback) only and the credentials below are
# weak defaults intended for local testing. If you need real DBs in prod, run
# them on dedicated hosts/managed services and never include this file in your
# `docker compose -f` chain.
#
# This file is automatically merged by Docker Compose when you run:
#   docker compose up
#
# It adds PostgreSQL, MySQL and MinIO for local testing.
# In production, simply do NOT copy this file (or rename it) so that only
# the core services in docker-compose.yml are started.
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:15-alpine
    container_name: dbmanager-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-testuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-testpassword}
      POSTGRES_DB: ${POSTGRES_DB:-testdb}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-testuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: dbmanager-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-testdb}
      MYSQL_USER: ${MYSQL_USER:-testuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-testpassword}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      # Anonymous ping — keeps the password out of `docker inspect`, ps, and
      # logs. Liveness only cares whether mysqld is accepting connections.
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --silent || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: dbmanager-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  seeder:
    # Opt-in only. Run with `docker compose --profile seed up seeder` to
    # populate the test DBs; left out of the default startup so it doesn't
    # silently re-run sample-data writes on every `compose up`.
    profiles:
      - seed
      - test
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: []
    command: ["python", "/app/seeds/seed_sample_dbs.py"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-testdb}
      POSTGRES_USER: ${POSTGRES_USER:-testuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-testpassword}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-testdb}
      MYSQL_USER: ${MYSQL_USER:-testuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-testpassword}
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
  mysql_data:
  minio_data:
