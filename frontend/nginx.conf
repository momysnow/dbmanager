server {
    listen 5173;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Don't expose nginx version on errors / Server header.
    server_tokens off;

    # Long-cache fingerprinted assets (vite emits hashed filenames in /assets/).
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any unknown path serves index.html so React Router can
    # resolve client-side. index.html itself must not be cached or users get
    # stale bundle hashes after a deploy.
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Local healthcheck endpoint used by docker HEALTHCHECK and Caddy upstream
    # probing. Responds without touching the filesystem.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }
}
